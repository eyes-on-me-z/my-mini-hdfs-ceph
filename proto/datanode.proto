syntax = "proto3";      // 使用 protobuf 第 3 版语法
package mini_storage;   // 这个 proto 里的消息属于 mini_storage 包

message WriteBlockRequest
{
    uint64 block_id = 1;
    bytes data = 2;                 // std::string data;
    // client -> datanode1 -> datanode2 -> datanode3
    // ["127.0.0.1:9002", "127.0.0.1:9003"]
    repeated string pipeline = 3;   // std::vector<std::string> pipeline;
}

message WriteBlockResponse
{
    bool success = 1;
    string error_message = 2;
}

message ReadBlockRequest
{
    uint64 block_id = 1;
    int64 offset = 2;
    int64 length = 3;
}

message ReadBlockResponse
{
    bool success = 1;
    bytes data = 2;
    uint32 crc32 = 3;
    string error_message = 4;
}

message DeleteBlockRequest
{
    uint64 block_id = 1;
}

message DeleteBlockResponse
{
    bool success = 1;
    string error_message = 2;
}

message DataNodeRequest
{
    enum OpType
    {
        WRITE_BLOCK = 0;
        READ_BLOCK = 1;
        DELETE_BLOCK = 2;
    };
    OpType op = 1;          // 表示当前请求的操作类型
    uint64 request_id = 2;  // 请求 ID (block_id)
    WriteBlockRequest write_block = 10;
    ReadBlockRequest read_block = 11;
    DeleteBlockRequest delete_block = 12;
}

message DataNodeResponse
{
    bool success = 1;
    string error_message = 2;
    uint64 request_id = 3;

    WriteBlockResponse write_block = 10;
    ReadBlockResponse read_block = 11;
    DeleteBlockResponse delete_block = 12;
}